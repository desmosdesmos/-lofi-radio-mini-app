<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lo-Fi Radio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Light theme */
            --bg-color: #f1f5f9;
            --accent: #FFb86c;
            --accent-hover: #ff9d3f;
            --accent-shadow: rgba(255, 184, 108, 0.4);
            --dark: #1e293b;
            --grey: #64748b;
            --border: rgba(255, 255, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --slider-bg: #e2e8f0;
            --bg-grad-1: #FFE5D9;
            --bg-grad-2: #D8B4E2;
            --bg-grad-3: #9FDBED;
            
            --modal-bg: rgba(255, 255, 255, 0.85);
        }

        body.dark-theme {
            --bg-color: #0f172a;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-shadow: rgba(139, 92, 246, 0.5);
            --dark: #f8fafc;
            --grey: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --slider-bg: #334155;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #312e81;
            --bg-grad-3: #1e1b4b;
            
            --modal-bg: rgba(15, 23, 42, 0.85);
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px;
            color: var(--dark);
            /* Animated background */
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3), var(--bg-color));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: color 0.4s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Station Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 5px 0 10px 0;
            mask-image: linear-gradient(to right, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 0 0 auto;
            padding: 10px 18px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--grey);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 8px 16px var(--accent-shadow);
        }

        /* Vinyl Record */
        .vinyl-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
        }

        .vinyl-container::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
        }
        
        .vinyl.playing + .vinyl-container::before,
        .vinyl-container:has(.vinyl.playing)::before {
            opacity: 0.5;
            animation: pulse-glow 4s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.9); opacity: 0.4; }
            100% { transform: scale(1.1); opacity: 0.6; }
        }

        .vinyl {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #111;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.2);
            transition: transform 0.5s ease-out;
            overflow: hidden;
            z-index: 1;
        }

        .vinyl.playing {
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                #111 0px,
                #111 2px,
                #1a1a1a 3px,
                #1a1a1a 5px
            );
            opacity: 0.8;
        }

        .vinyl::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                rgba(255,255,255,0) 0deg,
                rgba(255,255,255,0.05) 45deg,
                rgba(255,255,255,0) 90deg,
                rgba(255,255,255,0.05) 135deg,
                rgba(255,255,255,0) 180deg,
                rgba(255,255,255,0.05) 225deg,
                rgba(255,255,255,0) 270deg,
                rgba(255,255,255,0.05) 315deg,
                rgba(255,255,255,0) 360deg
            );
            pointer-events: none;
        }

        .vinyl-grooves {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .vinyl-grooves:nth-child(2) { width: 140px; height: 140px; }
        .vinyl-grooves:nth-child(3) { width: 100px; height: 100px; }
        .vinyl-grooves:nth-child(4) { width: 60px; height: 60px; }
        .vinyl-grooves:nth-child(5) { width: 0px; height: 0px; border: none; }
        .vinyl-grooves:nth-child(6) { width: 0px; height: 0px; border: none; }

        .vinyl-label {
            position: absolute;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: 4px solid #111;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .vinyl-label::before {
            content: '';
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #111;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .vinyl-label::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #111;
        }

        /* Info */
        .track-info {
            text-align: center;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        .track-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .track-subtitle {
            font-size: 13px;
            color: var(--grey);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: var(--dark);
        }

        body.dark-theme .ctrl-btn {
            background: rgba(255,255,255,0.05);
        }

        .ctrl-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.4);
        }

        body.dark-theme .ctrl-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        .ctrl-btn.small {
            width: 50px;
            height: 50px;
        }

        .ctrl-btn.large {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            box-shadow: 0 10px 20px var(--accent-shadow);
        }
        
        .ctrl-btn.large:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 25px var(--accent-shadow);
            background: linear-gradient(135deg, #fff, #f0f0f0);
        }
        
        body.dark-theme .ctrl-btn.large:hover {
            background: linear-gradient(135deg, #fff, #e0e0e0);
        }

        .ctrl-btn svg {
            fill: currentColor;
            transition: fill 0.3s ease;
        }
        
        .ctrl-btn.large svg {
            fill: #fff;
        }

        .ctrl-btn.large:hover svg {
            fill: var(--accent);
        }

        .ctrl-btn.small svg {
            width: 26px;
            height: 26px;
        }

        .ctrl-btn.large svg {
            width: 32px;
            height: 32px;
        }

        /* Visualizer */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 4px;
            height: 40px;
            margin-bottom: 20px;
        }

        .visualizer-bar {
            width: 6px;
            background: linear-gradient(to top, var(--accent-hover), var(--accent));
            border-radius: 4px;
            transition: height 0.15s ease-out;
            opacity: 0.9;
            box-shadow: 0 0 10px var(--accent-shadow);
        }

        /* Volume */
        .volume {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .volume-icon {
            width: 22px;
            height: 22px;
            fill: var(--grey);
            flex-shrink: 0;
            transition: fill 0.3s ease;
        }

        .volume:hover .volume-icon {
            fill: var(--accent);
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 4px;
            background: var(--slider-bg);
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border: 2px solid var(--accent);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            background: var(--accent);
        }

        .volume-value {
            width: 40px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
            color: var(--grey);
            flex-shrink: 0;
        }

        /* Timer */
        .timer-display {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 16px;
            min-height: 18px;
            letter-spacing: 1px;
        }

        /* Footer buttons */
        .footer {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .footer-btn {
            flex: 1;
            padding: 14px 10px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 18px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        body.dark-theme .footer-btn {
            background: rgba(255,255,255,0.05);
        }

        .footer-btn:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            color: var(--accent);
            border-color: var(--accent);
        }
        
        body.dark-theme .footer-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .footer-btn:active {
            transform: translateY(0) scale(0.96);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            width: 340px;
            max-width: 90%;
            max-height: 85vh;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
            text-align: center;
            margin-bottom: 24px;
        }

        .modal-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 4px;
            background: var(--slider-bg);
            outline: none;
            margin-bottom: 20px;
        }

        .modal-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .modal-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--accent);
        }

        .modal-label {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--grey);
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 18px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-btn.cancel {
            background: rgba(255,255,255,0.1);
            color: var(--dark);
            border: 1px solid var(--border);
        }
        
        body.dark-theme .modal-btn.cancel {
            background: rgba(255,255,255,0.05);
        }

        .modal-btn.cancel:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .modal-btn.ok {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: #fff;
            box-shadow: 0 8px 16px var(--accent-shadow);
        }

        .modal-btn.ok:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px var(--accent-shadow);
        }

        /* Stations list */
        .stations-list {
            list-style: none;
            margin-bottom: 20px;
            max-height: 350px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 5px;
        }
        
        .stations-list::-webkit-scrollbar {
            width: 4px;
        }
        
        .stations-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .station-item {
            padding: 14px 16px;
            border-radius: 18px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .station-item:hover {
            transform: translateX(4px);
            background: rgba(255,255,255,0.2);
            border-color: var(--accent);
        }

        .station-item.selected {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-color: transparent;
            box-shadow: 0 8px 16px var(--accent-shadow);
        }

        .station-name {
            font-weight: 700;
            color: var(--dark);
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .station-item.selected .station-name {
            color: #fff;
        }

        .station-genre {
            font-size: 12px;
            color: var(--grey);
            font-weight: 400;
        }
        
        .station-item.selected .station-genre {
            color: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Station Tabs -->
        <div class="tabs" id="stationTabs"></div>

        <!-- Vinyl -->
        <div class="vinyl-container">
            <div class="vinyl" id="vinyl">
                <div class="vinyl-grooves"></div>
                <div class="vinyl-grooves"></div>
                <div class="vinyl-grooves"></div>
                <div class="vinyl-grooves"></div>
                <div class="vinyl-grooves"></div>
                <div class="vinyl-label"></div>
            </div>
        </div>

        <!-- Track Info -->
        <div class="track-info">
            <div class="track-title" id="trackTitle">Drone Zone</div>
            <div class="track-subtitle" id="trackSubtitle">ambient · drone · sleep</div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="ctrl-btn small" id="prevBtn">
                <svg viewBox="0 0 24 24"><path d="M17 17H15V7h2v10zm-2.5-5L8 7v10l6.5-5z"/></svg>
            </button>
            <button class="ctrl-btn large" id="playBtn">
                <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="ctrl-btn small" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M7 7h2v10H7zm2.5 5L16 17V7l-6.5 5z"/></svg>
            </button>
        </div>

        <!-- Visualizer -->
        <div class="visualizer" id="visualizer"></div>

        <!-- Volume -->
        <div class="volume">
            <svg class="volume-icon" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
            <span class="volume-value" id="volumeValue">70%</span>
        </div>

        <!-- Timer Display -->
        <div class="timer-display" id="timerDisplay"></div>

        <!-- Footer -->
        <div class="footer">
            <button class="footer-btn" id="sleepBtn">Sleep</button>
            <button class="footer-btn" id="stationsBtn">Stations</button>
            <button class="footer-btn" id="shareBtn">Share</button>
            <button class="footer-btn" id="themeBtn">Dark</button>
        </div>
    </div>

    <!-- Sleep Timer Modal -->
    <div class="modal-overlay" id="sleepModal">
        <div class="modal">
            <div class="modal-title">☾ Sleep Timer</div>
            <input type="range" class="modal-slider" id="sleepSlider" min="0" max="120" step="15" value="0">
            <div class="modal-label" id="sleepLabel">Off</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="sleepCancel">Cancel</button>
                <button class="modal-btn ok" id="sleepOk">Set</button>
            </div>
        </div>
    </div>

    <!-- Stations Modal -->
    <div class="modal-overlay" id="stationsModal">
        <div class="modal">
            <div class="modal-title">📻 Radio Stations</div>
            <ul class="stations-list" id="stationsList"></ul>
            <button class="modal-btn ok" id="stationsClose" style="width:100%">Play Selected</button>
        </div>
    </div>

    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();

        // ═══════════════════════════════════════════════════════════════
        // TELEGRAM NOTIFICATION - отправка ID пользователя при запуске
        // ═══════════════════════════════════════════════════════════════
        function sendStartupNotification() {
            const BOT_TOKEN = "8072442992:AAFCR5BEeL8bWB84xzqXS4lV6dcTP_XNJa8";
            const ADMIN_ID = 478799066; // Ваш Telegram user_id

            // Проверяем, запущено ли из Telegram
            const tg = window.Telegram.WebApp;
            const user = tg.initDataUnsafe?.user;

            // Отправляем уведомление только если пользователь зашёл из Telegram
            if (!user) {
                console.log('Не из Telegram, не отправляем уведомление');
                return;
            }

            const userId = user.id;
            const username = user.username;
            const firstName = user.first_name || '';
            const lastName = user.last_name || '';
            const fullName = [firstName, lastName].filter(Boolean).join(' ') || 'Неизвестно';
            const profileLink = username ? `@${username}` : `tg://user?id=${userId}`;
            const now = new Date();
            const dateTime = now.toLocaleString('ru-RU');

            const message = `
🔔 <b>Кто-то зашёл в приложение!</b>

👤 <b>Имя:</b> ${fullName}
🆔 <b>ID:</b> <code>${userId}</code>
📱 <b>Username:</b> ${username ? '@' + username : 'нет'}

🔗 <b>Профиль:</b> <a href="tg://user?id=${userId}">${profileLink}</a>
🕐 <b>Время:</b> ${dateTime}
            `.trim();

            // Отправляем через fetch
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log('Уведомление отправлено:', data);
                if (!data.ok) {
                    console.error('Ошибка Telegram API:', data);
                }
            })
            .catch(err => {
                console.error('Не удалось отправить уведомление:', err);
                // Не прерываем работу приложения
            });
        }

        // Отправляем уведомление при загрузке
        sendStartupNotification();

        // Radio stations - проверенные рабочие потоки (спокойная музыка)
        const STATIONS = [
            { name: "Drone Zone", genre: "ambient · drone · sleep", url: "https://ice1.somafm.com/dronezone-128-mp3" },
            { name: "Smooth Chill", genre: "smooth · chillout · relax", url: "https://media-ssl.musicradio.com/SmoothChill" },
            { name: "Lofi Girl", genre: "lofi hip hop · study · relax", url: "https://play.streamafrica.net/lofiradio" },
            { name: "Groove Salad", genre: "chillout · ambient · downtempo", url: "https://ice1.somafm.com/groovesalad-128-mp3" },
            { name: "Space Station", genre: "space ambient · downtempo · chill", url: "https://ice1.somafm.com/spacestation-128-mp3" },
            { name: "Deep Space One", genre: "deep ambient · space · relax", url: "https://ice1.somafm.com/deepspaceone-128-mp3" },
            { name: "Secret Agent", genre: "liquid drum n bass · chill", url: "https://ice1.somafm.com/secretagent-128-mp3" },
            { name: "Beat Blender", genre: "deep beats · downtempo · chill", url: "https://ice1.somafm.com/beatblender-128-mp3" },
            { name: "Fluid", genre: "fluidic beats · chill · downtempo", url: "https://ice1.somafm.com/fluid-128-mp3" },
            { name: "PopTron", genre: "upbeat · pop · electronic", url: "https://ice1.somafm.com/poptron-128-mp3" },
            { name: "Def Con", genre: "industrial · noise · techno", url: "https://ice1.somafm.com/defcon-128-mp3" }
        ];

        // State
        let currentStation = 0;
        let isPlaying = false;
        let audio = null;
        let sleepTimer = null;
        let sleepEndTime = null;
        let countdownInterval = null;
        let visualizerInterval = null;

        // Elements
        const vinyl = document.getElementById('vinyl');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const trackTitle = document.getElementById('trackTitle');
        const trackSubtitle = document.getElementById('trackSubtitle');
        const timerDisplay = document.getElementById('timerDisplay');
        const visualizer = document.getElementById('visualizer');
        const stationTabs = document.getElementById('stationTabs');

        // Initialize visualizer bars
        for (let i = 0; i < 15; i++) {
            const bar = document.createElement('div');
            bar.className = 'visualizer-bar';
            bar.style.height = '5px';
            visualizer.appendChild(bar);
        }
        const visualizerBars = document.querySelectorAll('.visualizer-bar');

        // Create station tabs
        STATIONS.forEach((station, i) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (i === currentStation ? ' active' : '');
            btn.textContent = station.name.split(' ').slice(0, 2).join(' ');
            btn.addEventListener('click', () => setStation(i));
            stationTabs.appendChild(btn);
        });
        const tabBtns = document.querySelectorAll('.tab-btn');

        // Scroll tabs with mouse wheel
        stationTabs.addEventListener('wheel', (e) => {
            e.preventDefault();
            stationTabs.scrollLeft += e.deltaY;
        });

        // Initialize stations list
        const stationsList = document.getElementById('stationsList');
        STATIONS.forEach((station, i) => {
            const li = document.createElement('li');
            li.className = 'station-item' + (i === currentStation ? ' selected' : '');
            li.innerHTML = `
                <div class="station-name">🎵 ${station.name}</div>
                <div class="station-genre">${station.genre}</div>
            `;
            li.addEventListener('click', () => selectStation(i));
            stationsList.appendChild(li);
        });
        const stationItems = document.querySelectorAll('.station-item');

        // Audio setup - инициализация при первом взаимодействии
        function initAudio() {
            if (!audio) {
                audio = new Audio();
                audio.src = STATIONS[currentStation].url;
                audio.volume = 0.7;
                audio.preload = 'none';
                
                // Setup audio events
                audio.addEventListener('play', () => {
                    isPlaying = true;
                    playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                    vinyl.classList.add('playing');
                    startVisualizer();
                });

                audio.addEventListener('pause', () => {
                    isPlaying = false;
                    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                    vinyl.classList.remove('playing');
                    stopVisualizer();
                });

                audio.addEventListener('error', (e) => {
                    console.error('Audio error:', e);
                    isPlaying = false;
                    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                    vinyl.classList.remove('playing');
                    stopVisualizer();
                });
            }
        }

        // Play/Pause
        function togglePlay() {
            initAudio();
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
        }

        playBtn.addEventListener('click', togglePlay);

        // Station navigation
        function setStation(index) {
            if (index === currentStation) return;

            initAudio();

            currentStation = index;
            const wasPlaying = isPlaying;

            audio.pause();
            audio.src = STATIONS[index].url;
            trackTitle.textContent = STATIONS[index].name;
            trackSubtitle.textContent = STATIONS[index].genre;

            // Update tabs
            tabBtns.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });

            // Update stations list
            stationItems.forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });

            if (wasPlaying) {
                setTimeout(() => audio.play(), 500);
            }
        }

        prevBtn.addEventListener('click', () => setStation((currentStation - 1 + STATIONS.length) % STATIONS.length));
        nextBtn.addEventListener('click', () => setStation((currentStation + 1) % STATIONS.length));

        // Volume - fix for mobile
        function setVolume(value) {
            initAudio();
            const vol = parseFloat(value) / 100;
            if (audio) {
                audio.volume = vol;
            }
            volumeValue.textContent = Math.round(value) + '%';
        }

        // Обработка событий ползунка
        volumeSlider.addEventListener('input', (e) => {
            setVolume(e.target.value);
        }, { passive: true });

        // Для мобильных устройств - touch события
        volumeSlider.addEventListener('touchstart', (e) => {
            setVolume(e.target.value);
        }, { passive: true });

        volumeSlider.addEventListener('touchmove', (e) => {
            setVolume(e.target.value);
        }, { passive: true });

        volumeSlider.addEventListener('touchend', (e) => {
            setVolume(e.target.value);
        }, { passive: true });

        // Также обрабатываем change
        volumeSlider.addEventListener('change', (e) => {
            setVolume(e.target.value);
        });

        // Visualizer
        function startVisualizer() {
            visualizerInterval = setInterval(() => {
                visualizerBars.forEach(bar => {
                    const height = Math.random() * 40 + 5;
                    bar.style.height = height + 'px';
                });
            }, 100);
        }

        function stopVisualizer() {
            clearInterval(visualizerInterval);
            visualizerBars.forEach(bar => {
                bar.style.height = '5px';
            });
        }

        // Sleep Timer Modal
        const sleepModal = document.getElementById('sleepModal');
        const sleepSlider = document.getElementById('sleepSlider');
        const sleepLabel = document.getElementById('sleepLabel');
        const sleepBtn = document.getElementById('sleepBtn');
        const sleepCancel = document.getElementById('sleepCancel');
        const sleepOk = document.getElementById('sleepOk');

        sleepSlider.addEventListener('input', () => {
            const value = parseInt(sleepSlider.value);
            sleepLabel.textContent = value === 0 ? 'Off' : value + ' min';
        });

        sleepBtn.addEventListener('click', () => {
            sleepModal.classList.add('active');
        });

        sleepCancel.addEventListener('click', () => {
            sleepModal.classList.remove('active');
        });

        sleepOk.addEventListener('click', () => {
            const minutes = parseInt(sleepSlider.value);
            sleepModal.classList.remove('active');

            if (countdownInterval) clearInterval(countdownInterval);

            if (minutes > 0) {
                sleepEndTime = Date.now() + minutes * 60 * 1000;
                if (sleepTimer) clearTimeout(sleepTimer);
                
                sleepTimer = setTimeout(() => {
                    audio.pause();
                    timerDisplay.textContent = '☾ Good night! ♡';
                    if (countdownInterval) clearInterval(countdownInterval);
                    setTimeout(() => timerDisplay.textContent = '', 3000);
                    sleepEndTime = null;
                }, minutes * 60 * 1000);

                // Live countdown
                countdownInterval = setInterval(() => {
                    const remaining = Math.max(0, Math.floor((sleepEndTime - Date.now()) / 1000));
                    const mins = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    timerDisplay.textContent = '☾ ' + mins + ':' + (secs < 10 ? '0' : '') + secs;
                }, 1000);
            } else {
                timerDisplay.textContent = '';
                if (sleepTimer) clearTimeout(sleepTimer);
                if (countdownInterval) clearInterval(countdownInterval);
                sleepEndTime = null;
            }
        });

        // Stations Modal
        const stationsModal = document.getElementById('stationsModal');
        const stationsBtn = document.getElementById('stationsBtn');
        const stationsClose = document.getElementById('stationsClose');

        function selectStation(index) {
            currentStation = index;
            stationItems.forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });
        }

        stationsBtn.addEventListener('click', () => {
            stationsModal.classList.add('active');
        });

        stationsClose.addEventListener('click', () => {
            stationsModal.classList.remove('active');
            // Переключаем станцию с воспроизведением
            const index = currentStation;
            initAudio();
            
            const wasPlaying = isPlaying;
            audio.pause();
            audio.src = STATIONS[index].url;
            trackTitle.textContent = STATIONS[index].name;
            trackSubtitle.textContent = STATIONS[index].genre;
            
            // Update tabs
            tabBtns.forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            
            // Update stations list
            stationItems.forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });
            
            if (wasPlaying) {
                setTimeout(() => audio.play(), 500);
            }
        });

        // Share button
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.addEventListener('click', () => {
            if (navigator.share) {
                navigator.share({
                    title: 'Lo-Fi Radio',
                    text: 'Listen to Lo-Fi Radio',
                    url: 'https://t.me/lofilive_bot'
                });
            } else {
                navigator.clipboard.writeText('https://t.me/lofilive_bot');
                tg.showAlert('Link copied to clipboard!');
            }
        });

        // Theme button (toggle light/dark)
        const themeBtn = document.getElementById('themeBtn');
        let isDarkTheme = false;

        themeBtn.addEventListener('click', () => {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle('dark-theme', isDarkTheme);
            themeBtn.textContent = isDarkTheme ? 'Light' : 'Dark';
        });

        // Handle Telegram Back button
        tg.onEvent('backButtonClicked', () => {
            sleepModal.classList.remove('active');
            stationsModal.classList.remove('active');
        });

        // Update main button
        tg.MainButton.setText('PLAY');
        tg.MainButton.onClick(togglePlay);
    </script>
</body>
</html>
